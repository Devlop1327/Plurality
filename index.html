<!DOCTYPE html>
<html class="light" lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Plurality - App Educativa</title>
    <link href="css/style.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Lexend:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
</head>

<body class="bg-white dark:bg-slate-950 text-slate-900 dark:text-white min-h-screen">
    <!-- TopNavBar -->
    <header
        class="bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 shadow-sm sticky top-0 z-50">
        <nav class="flex justify-between items-center w-full px-8 py-4 max-w-7xl mx-auto">
            <div class="text-2xl font-bold text-[#7E57C2] dark:text-[#b39ddb] font-headline tracking-tight cursor-pointer hover:opacity-80"
                onclick="app.navigateTo('dashboard')">
                Plurality
            </div>
            <div class="hidden md:flex items-center gap-8 font-['Plus_Jakarta_Sans'] font-semibold tracking-tight">
                <a class="text-slate-600 dark:text-slate-400 hover:text-[#7E57C2] transition-colors cursor-pointer"
                    onclick="app.navigateTo('educativo')">Aprende</a>
                <a class="text-slate-600 dark:text-slate-400 hover:text-[#7E57C2] transition-colors cursor-pointer"
                    onclick="app.navigateTo('inclusion')">Inclusión</a>
                <a class="text-slate-600 dark:text-slate-400 hover:text-[#7E57C2] transition-colors cursor-pointer"
                    onclick="app.navigateTo('derechos')">Derechos</a>
                <a class="text-slate-600 dark:text-slate-400 hover:text-[#7E57C2] transition-colors cursor-pointer"
                    onclick="app.navigateTo('historia')">Historia</a>
                <a class="text-slate-600 dark:text-slate-400 hover:text-[#7E57C2] transition-colors cursor-pointer"
                    onclick="app.navigateTo('aliado')">Aliado</a>
                <a class="text-slate-600 dark:text-slate-400 hover:text-[#7E57C2] transition-colors cursor-pointer"
                    onclick="app.navigateTo('juegos')">Juega</a>
                <a class="text-slate-600 dark:text-slate-400 hover:text-[#7E57C2] transition-colors cursor-pointer"
                    onclick="app.navigateTo('simulador')">Empatiza</a>
                <a class="text-slate-600 dark:text-slate-400 hover:text-[#7E57C2] transition-colors cursor-pointer"
                    onclick="app.navigateTo('evaluacion')">Evalúate</a>
            </div>
            <div class="flex items-center gap-4">
                <button class="p-2 hover:bg-slate-100/50 dark:hover:bg-slate-800/50 rounded-full transition-all"
                    onclick="app.toggleDarkMode()">
                    <span class="material-symbols-outlined text-[#7E57C2]">dark_mode</span>
                </button>
            </div>
        </nav>
    </header>

    <!-- Main Content Area -->
    <main id="app-container" class="min-h-[calc(100vh-80px)]">
        <!-- Content will be injected here -->
    </main>

    <!-- Footer -->
    <footer class="bg-slate-50 dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 mt-16">
        <div class="max-w-7xl mx-auto px-8 py-8 text-center text-slate-600 dark:text-slate-400 text-sm">
            <p>© 2026 Plurality - Educación en Género y Diversidad</p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="js/data/quiz.js"></script>
    <script src="js/modules/storage.js"></script>
    <script src="js/modules/dashboard.js"></script>
    <script src="js/modules/educativo.js"></script>
    <script src="js/modules/inclusion.js"></script>
    <script src="js/modules/derechos.js"></script>
    <script src="js/modules/historia.js"></script>
    <script src="js/modules/aliado.js"></script>
    <script src="js/modules/juegos.js"></script>
    <script src="js/modules/simulador.js"></script>
    <script src="js/modules/evaluacion.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
